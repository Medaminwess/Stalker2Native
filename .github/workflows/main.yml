name: Build Stalker2 Native APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    - uses: android-actions/setup-android@v3
    - name: Accept licenses
      run: yes | sdkmanager --licenses 2>/dev/null || true
    - name: Install Android platform
      run: sdkmanager "platforms;android-34" "build-tools;34.0.0"
    - name: Download MicroEmulator runtime
      run: |
        wget -q https://codeload.github.com/ichisadashioko/microemulator/zip/refs/heads/master -O microemu.zip
        unzip -q microemu.zip
        cp -r microemulator-master/microemu-android/src/org app/src/main/java/
        find microemulator-master/microemu-midp -name "*.java" -path "*/src/main/java/*" | while read f; do
          rel="${f#*src/main/java/}"
          dir="app/src/main/java/$(dirname "$rel")"
          mkdir -p "$dir"
          cp "$f" "$dir/"
        done
    - name: Build APK
      run: gradle assembleDebug --no-daemon
    - uses: actions/upload-artifact@v4
      with:
        name: Stalker2-Native-APK
        path: app/build/outputs/apk/debug/app-debug.apk
