name: Build Stalker2 Native APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - uses: android-actions/setup-android@v3
    - name: Install Android platform
      run: |
        yes | sdkmanager --licenses 2>/dev/null || true
        sdkmanager "platforms;android-34" "build-tools;34.0.0"
    - name: Install Gradle
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.9-bin.zip
        unzip -q gradle-8.9-bin.zip -d /opt/gradle
        echo "/opt/gradle/gradle-8.9/bin" >> $GITHUB_PATH
    - name: Download and prepare MicroEmulator
      run: |
        wget -q https://codeload.github.com/ichisadashioko/microemulator/zip/refs/heads/master -O m.zip
        unzip -q m.zip
        copy_module() {
          find "$1" -name "*.java" -path "*/src/main/java/*" | while read f; do
            rel="${f#*src/main/java/}"
            dir="app/src/main/java/$(dirname "$rel")"
            mkdir -p "$dir"
            cp "$f" "$dir/"
          done
        }
        cp -r microemulator-master/microemu-android/src/org app/src/main/java/
        copy_module microemulator-master/microemu-midp
        copy_module microemulator-master/microemu-cldc
        copy_module microemulator-master/microemu-javase
        python3 -c "
f=open('app/src/main/java/javax/microedition/media/Manager.java','w')
f.write('package javax.microedition.media;\nimport java.io.IOException;\nimport java.io.InputStream;\npublic class Manager {\npublic static Player createPlayer(String l) throws IOException,MediaException{return null;}\npublic static Player createPlayer(InputStream s,String t) throws IOException,MediaException{return null;}\npublic static String[] getSupportedContentTypes(String p){return new String[0];}\npublic static String[] getSupportedProtocols(String c){return new String[0];}\n}\n')
f.close()
"
        rm -rf app/src/main/java/org/microemu/midp/media/audio/
        find app/src/main/java -name "SampledAudioPlayer.java" -delete
        find app/src/main/java -name "MidiAudioPlayer.java" -delete
        find app/src/main/java -name "AndroidListUI.java" -delete
        find app/src/main/java -name "AndroidFormUI.java" -delete
        find app/src/main/java -name "AndroidTextBoxUI.java" -delete
        find app/src/main/java -name "AndroidAlertUI.java" -delete
        find app/src/main/java -name "PushRegistry.java" -delete
        find app/src/main/java -name "SocketConnector.java" -delete
        sed -i '/import.*AndroidAlertUI/d;/import.*AndroidFormUI/d;/import.*AndroidListUI/d;/import.*AndroidTextBoxUI/d' app/src/main/java/org/microemu/android/device/AndroidDevice.java
        sed -i 's/return new AndroidAlertUI(activity, alert);/return null;/;s/return new AndroidFormUI(activity, form);/return null;/;s/return new AndroidListUI(activity, list);/return null;/;s/return new AndroidTextBoxUI(activity, textBox);/return null;/' app/src/main/java/org/microemu/android/device/AndroidDevice.java
        sed -i 's/\.save(Canvas\.CLIP_SAVE_FLAG)/.save()/g' app/src/main/java/org/microemu/android/device/AndroidDisplayGraphics.java
        echo "Java files: $(find app/src/main/java -name '*.java' | wc -l)"
    - name: Build APK
      run: gradle assembleDebug --no-daemon
    - uses: actions/upload-artifact@v4
      with:
        name: Stalker2-Native-APK
        path: "**/*.apk"
